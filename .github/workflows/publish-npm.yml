on:
  release:
    types: [published]

name: publish-npm

permissions:
  id-token: write
  contents: read

jobs:
  deploy-npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          registry-url: "https://registry.npmjs.org"
      - run: npm install
      - run: npm run build
      - run: npm publish --provenance
